services:
  # ─── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ms_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro  # 초기화 SQL 스크립트 마운트
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ─── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ms_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./backend:/app          # 핫 리로드를 위한 볼륨 마운트
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  # ─── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ms_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    volumes:
      - ./frontend:/app         # 핫 리로드를 위한 볼륨 마운트
      - frontend_node_modules:/app/node_modules   # 컨테이너 내부 node_modules 보존
      - frontend_next_cache:/app/.next             # 빌드 캐시 보존
    depends_on:
      - backend
    expose:
      - "3000"

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  # image만 사용 + nginx.conf를 볼륨으로 마운트 → 설정 변경 시 재빌드 불필요
  nginx:
    image: nginx:1.27-alpine
    container_name: ms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro   # 설정 파일 직접 마운트
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
    driver: local
  frontend_node_modules:   # node_modules 명명 볼륨 (호스트와 분리)
  frontend_next_cache:     # .next 빌드 캐시 명명 볼륨
