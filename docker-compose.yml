services:
  # ─── PostgreSQL ───────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: ms_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB 환경 변수가 설정되지 않았습니다.}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER 환경 변수가 설정되지 않았습니다.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 환경 변수가 설정되지 않았습니다.}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro  # 초기화 SQL 스크립트 마운트
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ─── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ms_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./backend:/app          # 핫 리로드를 위한 볼륨 마운트
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  # ─── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ms_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    volumes:
      - ./frontend:/app         # 핫 리로드를 위한 볼륨 마운트
      - frontend_node_modules:/app/node_modules   # 컨테이너 내부 node_modules 보존
      - frontend_next_cache:/app/.next             # 빌드 캐시 보존
    depends_on:
      - backend
    expose:
      - "3000"

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  # image만 사용 + nginx.conf를 볼륨으로 마운트 → 설정 변경 시 재빌드 불필요
  nginx:
    image: nginx:1.27-alpine
    container_name: ms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro   # 설정 파일 직접 마운트
    depends_on:
      - frontend
      - backend

  # ─── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ms_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"

  # ─── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: ms_grafana
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ─── cAdvisor (Container Resource Metrics) ─────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ms_cadvisor
    restart: unless-stopped
    devices:
      - "/dev/kmsg:/dev/kmsg"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"

  # ─── Nginx Prometheus Exporter ────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: ms_nginx_exporter
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://nginx:8080/stub_status
    depends_on:
      - nginx
    expose:
      - "9113"

  # ─── PostgreSQL Prometheus Exporter ───────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ms_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9187"

volumes:
  postgres_data:
    driver: local
  frontend_node_modules:   # node_modules 명명 볼륨 (호스트와 분리)
  frontend_next_cache:     # .next 빌드 캐시 명명 볼륨
  prometheus_data:
  grafana_data:
